<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="100%" stop-color="#131C36"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="50%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.08">
    <path d="M0 100H1600" stroke="white"/>
    <path d="M0 200H1600" stroke="white"/>
    <path d="M0 300H1600" stroke="white"/>
    <path d="M0 400H1600" stroke="white"/>

    <path d="M200 0V500" stroke="white"/>
    <path d="M400 0V500" stroke="white"/>
    <path d="M600 0V500" stroke="white"/>
    <path d="M800 0V500" stroke="white"/>
    <path d="M1000 0V500" stroke="white"/>
    <path d="M1200 0V500" stroke="white"/>
    <path d="M1400 0V500" stroke="white"/>
  </g>

  <!-- Blockchain Nodes -->
  <g opacity="0.85">
    <circle cx="1200" cy="120" r="12" fill="#00D4FF"/>
    <circle cx="1320" cy="200" r="12" fill="#7B61FF"/>
    <circle cx="1450" cy="140" r="12" fill="#4285F4"/>
    <circle cx="1260" cy="320" r="12" fill="#00D4FF"/>
    <circle cx="1460" cy="320" r="12" fill="#7B61FF"/>

    <line x1="1200" y1="120" x2="1320" y2="200" stroke="url(#accent)" stroke-width="2"/>
    <line x1="1320" y1="200" x2="1450" y2="140" stroke="url(#accent)" stroke-width="2"/>
    <line x1="1320" y1="200" x2="1260" y2="320" stroke="url(#accent)" stroke-width="2"/>
    <line x1="1260" y1="320" x2="1460" y2="320" stroke="url(#accent)" stroke-width="2"/>
  </g>

  <!-- Shield -->
  <g transform="translate(100,120)">
    <path d="M120 0L220 40V140C220 230 170 290 120 320C70 290 20 230 20 140V40L120 0Z"
          fill="url(#accent)"
          opacity="0.9"
          filter="url(#glow)"/>

    <path d="M120 80V210" stroke="white" stroke-width="16" stroke-linecap="round"/>

    <circle cx="120" cy="60" r="20" fill="white"/>
  </g>

  <!-- Title -->
  <text x="420" y="180" fill="white" font-size="78" font-family="Inter, Arial, sans-serif" font-weight="800">
    DoVER
  </text>

  <!-- Subtitle -->
  <text x="420" y="240" fill="#A8B3CF" font-size="30" font-family="Inter, Arial, sans-serif">
    Decentralized Official Vault &amp; Evidence Registry
  </text>

  <!-- Description -->
  <text x="420" y="300" fill="#D6DCEB" font-size="24" font-family="Inter, Arial, sans-serif">
    AI-Powered Digital Asset Protection | PKI Verification
  </text>

  <text x="420" y="340" fill="#D6DCEB" font-size="24" font-family="Inter, Arial, sans-serif">
    Polygon Blockchain Anchoring | Forensic Integrity
  </text>

  <!-- Feature Pills -->
  <rect x="420" y="390" width="210" height="42" rx="21" fill="#4285F4" opacity="0.25"/>
  <text x="465" y="418" fill="white" font-size="18" font-family="Inter">Vertex AI</text>

  <rect x="640" y="390" width="190" height="42" rx="21" fill="#7B61FF" opacity="0.25"/>
  <text x="678" y="418" fill="white" font-size="18" font-family="Inter">PKI Trust</text>

  <rect x="840" y="390" width="260" height="42" rx="21" fill="#00D4FF" opacity="0.25"/>
  <text x="875" y="418" fill="white" font-size="18" font-family="Inter">Blockchain Proof</text>

</svg>
