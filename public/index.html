<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>DocVault - Official Portal</title>
    <meta name="description" content="DocVault: Secure document verification portal with blockchain-based integrity checking."/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant":"#004493","on-secondary":"#ffffff","surface-container-low":"#f3f4f5",
                        "surface-bright":"#f8f9fa","outline":"#737780","primary-fixed":"#d5e3ff","secondary":"#0059bb",
                        "surface":"#f8f9fa","tertiary-container":"#592300","primary-container":"#003366",
                        "on-background":"#191c1d","surface-tint":"#3a5f94","on-primary-fixed-variant":"#1f477b",
                        "primary":"#001e40","on-error-container":"#93000a","tertiary":"#381300",
                        "on-tertiary-fixed":"#341100","secondary-fixed-dim":"#adc7ff","error-container":"#ffdad6",
                        "on-tertiary-container":"#d8885c","on-error":"#ffffff","surface-container-lowest":"#ffffff",
                        "inverse-primary":"#a7c8ff","primary-fixed-dim":"#a7c8ff","surface-container-high":"#e7e8e9",
                        "on-surface":"#191c1d","tertiary-fixed-dim":"#ffb690","on-primary-container":"#799dd6",
                        "inverse-on-surface":"#f0f1f2","on-tertiary":"#ffffff","surface-variant":"#e1e3e4",
                        "tertiary-fixed":"#ffdbca","error":"#ba1a1a","on-primary":"#ffffff","background":"#f8f9fa",
                        "on-surface-variant":"#43474f","on-primary-fixed":"#001b3c","on-secondary-fixed":"#001a41",
                        "on-secondary-container":"#fefcff","secondary-container":"#0070ea","secondary-fixed":"#d8e2ff",
                        "on-tertiary-fixed-variant":"#723610","outline-variant":"#c3c6d1",
                        "surface-container-highest":"#e1e3e4","inverse-surface":"#2e3132",
                        "surface-container":"#edeeef","surface-dim":"#d9dadb"
                    },
                    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
                    fontFamily:{"headline":["Inter"],"body":["Inter"],"label":["Inter"]}
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/styles.css"/>
</head>
<body class="bg-surface text-on-surface">
    <!-- Sidebar -->
    <aside id="sidebar" class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-slate-100 flex-col py-4 space-y-2 z-50">
        <div class="px-6 mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center text-on-primary shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">verified_user</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-blue-900 tracking-tighter">DocVault</h1>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Official Portal</p>
                </div>
            </div>
        </div>
        <nav id="nav-links" class="flex-1 px-4 space-y-1">
            <a href="#dashboard" data-page="dashboard" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">dashboard</span><span class="font-medium text-sm">Dashboard</span>
            </a>
            <a href="#upload" data-page="upload" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">cloud_upload</span><span class="font-medium text-sm">Upload</span>
            </a>
            <a href="#verify" data-page="verify" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">verified_user</span><span class="font-medium text-sm">Verify</span>
            </a>
            <a href="#chain" data-page="chain" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">account_tree</span><span class="font-medium text-sm">Chain Explorer</span>
            </a>
            <a href="#audit" data-page="audit" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">history_edu</span><span class="font-medium text-sm">Audit Log</span>
            </a>
        </nav>
        <div class="px-4 pt-4 border-t border-slate-200 space-y-1">
            <a class="flex items-center px-4 py-2 text-slate-600 mx-2 hover:bg-slate-200 transition-all rounded-lg" href="#"><span class="material-symbols-outlined mr-3 text-xl">help</span><span class="font-medium text-sm">Support</span></a>
            <a class="flex items-center px-4 py-2 text-slate-600 mx-2 hover:bg-slate-200 transition-all rounded-lg" href="#"><span class="material-symbols-outlined mr-3 text-xl">info</span><span class="font-medium text-sm">Help</span></a>
        </div>
    </aside>

    <!-- Top Header -->
    <header class="fixed top-0 w-full z-40 bg-slate-50/80 backdrop-blur-xl flex justify-between items-center px-6 py-3 shadow-sm shadow-blue-900/5 md:pl-72">
        <div class="flex items-center gap-4">
            <span class="md:hidden material-symbols-outlined text-blue-900 cursor-pointer" id="menu-toggle">menu</span>
            <h2 id="page-title" class="font-sans tracking-tight text-slate-500 font-medium text-sm">Welcome back, Admin</h2>
        </div>
        <div class="flex items-center gap-2">
            <button class="p-2 rounded-full hover:bg-slate-200/50 transition-colors text-slate-500"><span class="material-symbols-outlined">notifications</span></button>
            <button class="p-2 rounded-full hover:bg-slate-200/50 transition-colors text-slate-500"><span class="material-symbols-outlined">settings</span></button>
            <div class="h-8 w-8 rounded-full bg-primary-fixed flex items-center justify-center ml-2 text-primary font-bold text-sm">A</div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app" class="pt-24 pb-12 px-6 md:ml-64 transition-all"></main>

    <script src="/app.js"></script>
</body>
</html>
