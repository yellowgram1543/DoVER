<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>DoVER - Official Portal</title>
    <meta name="description" content="Decentralized Official Vault for Electronic Records"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        // Apply theme immediately to prevent flash
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary":"#001e40",
                        "secondary":"#0059bb",
                        "error":"#ba1a1a",
                        "surface-container-low":"#f3f4f5",
                        "surface-container-lowest":"#ffffff",
                        "on-surface-variant":"#43474f",
                        "outline-variant":"#c3c6d1"
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/styles.css"/>
</head>
<body class="bg-surface text-on-surface">
    <!-- Sidebar -->
    <aside id="sidebar" class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-slate-100 dark:bg-[#1C2A41] flex-col py-4 space-y-2 z-50 transition-colors">
        <div class="px-6 mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center text-white shadow-lg">
                    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">verified_user</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-blue-900 dark:text-[#E9C176] tracking-tighter">DoVER</h1>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 dark:text-[#D6E3FF]/60 font-bold">Official Portal</p>
                </div>
            </div>
        </div>
        <nav id="nav-links" class="flex-1 px-4 space-y-1">
            <a href="#dashboard" data-page="dashboard" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">dashboard</span><span class="font-medium text-sm">Dashboard</span>
            </a>
            <a href="#upload" data-page="upload" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">cloud_upload</span><span class="font-medium text-sm">Upload</span>
            </a>
            <a href="#batch" data-page="batch" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">folder_open</span><span class="font-medium text-sm">Batch Upload</span>
            </a>
            <a href="#verify" data-page="verify" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">verified_user</span><span class="font-medium text-sm">Verify</span>
            </a>
            <a href="#chain" data-page="chain" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">account_tree</span><span class="font-medium text-sm">Chain Explorer</span>
            </a>
            <a href="#audit" data-page="audit" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">history_edu</span><span class="font-medium text-sm">Audit Log</span>
            </a>
            <a href="#settings" data-page="settings" class="nav-link flex items-center px-4 py-3 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">settings</span><span class="font-medium text-sm">Settings</span>
            </a>
        </nav>
        <div class="px-4 pt-4 border-t border-slate-200 dark:border-slate-700 space-y-1">
            <a href="#help" data-page="help" class="nav-link flex items-center px-4 py-2 mx-2 rounded-lg transition-all group">
                <span class="material-symbols-outlined mr-3 text-xl">help</span><span class="font-medium text-sm">Help Guide</span>
            </a>
        </div>
    </aside>

    <!-- Top Header -->
    <header class="fixed top-0 w-full z-40 bg-white/80 dark:bg-[#0A192F]/80 backdrop-blur-xl flex justify-between items-center px-6 py-3 shadow-sm md:pl-72 transition-colors">
        <div class="flex items-center gap-4">
            <span class="md:hidden material-symbols-outlined text-blue-900 dark:text-[#E9C176] cursor-pointer" id="menu-toggle">menu</span>
            <h2 id="page-title" class="font-sans tracking-tight text-slate-500 dark:text-[#D6E3FF] font-medium text-sm">Welcome back, Admin</h2>
        </div>
        <div class="flex items-center gap-2">
            <a href="#settings" class="p-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors text-slate-500 dark:text-[#D6E3FF]"><span class="material-symbols-outlined">settings</span></a>
            <div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-[#E9C176] flex items-center justify-center ml-2 text-primary font-bold text-sm">A</div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app" class="pt-24 pb-12 px-6 md:ml-64 transition-all"></main>

    <script src="/app.js"></script>
</body>
</html>
